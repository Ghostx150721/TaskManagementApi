name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Restore
    - name: Restore dependencies
      working-directory: ./TaskManagementAPI
      run: dotnet restore TaskManagementApi.sln

    # Build
    - name: Build
      working-directory: ./TaskManagementAPI
      run: dotnet build TaskManagementApi.sln --no-restore --configuration Release

    # Test
    - name: Run tests
      working-directory: ./TaskManagementAPI
      run: dotnet test TaskManagementApi.sln --no-build --verbosity normal