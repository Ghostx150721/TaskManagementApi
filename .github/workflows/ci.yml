name: .NET CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      working-directory: ./TaskManagementAPI
      run: dotnet restore TaskManagementAPI.sln

    - name: Build
      working-directory: ./TaskManagementAPI
      run: dotnet build TaskManagementAPI.sln --no-restore --configuration Release

    - name: Test
      working-directory: ./TaskManagementAPI
      run: dotnet test TaskManagementAPI.sln --configuration Release --verbosity normal

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Set lowercase image name
      run: |
        IMAGE_NAME=$(echo "ghcr.io/${GITHUB_REPOSITORY}/task-api:latest" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME ./TaskManagementAPI

    - name: Push Docker Image
      run: docker push $IMAGE_NAME

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy on Homelab
        run: |
          cd /srv/docker/api
          docker compose pull
          docker compose up -d